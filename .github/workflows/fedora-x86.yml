name: Fedora x86

on:
  # push:
  # pull_request:
  #   branches: [main]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container: fedora:42
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { compiler: GNU, CC: gcc, CXX: g++ }
          - { compiler: LLVM, CC: clang, CXX: clang++ }
        type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            ca-certificates cmake ninja-build gcc gcc-c++ \
            llvm llvm-devel clang mlir mlir-devel \
            python3 python3-pip python3-setuptools \
            wget xz diffutils zlib-devel ncurses-libs libffi-devel
          pip3 install lit --break-system-packages
      - name: Build eter
        env:
          CC: ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run: |
          LLVM_CMAKE_DIR="$(llvm-config --cmakedir)"
          MLIR_CMAKE_DIR="${LLVM_CMAKE_DIR%/llvm}/mlir"
          FILECHECK_PATH="$(command -v FileCheck || command -v FileCheck-22)"
          LLVM_TOOLS_BIN_DIR="$(dirname "${FILECHECK_PATH}")"
          mkdir build && cd build
          cmake -DLLVM_DIR="${LLVM_CMAKE_DIR}" \
                -DMLIR_DIR="${MLIR_CMAKE_DIR}" \
                -DLLVM_TOOLS_BINARY_DIR="${LLVM_TOOLS_BIN_DIR}" \
                -DCMAKE_BUILD_TYPE=${{ matrix.type }} \
                -G Ninja ../
          ninja -j2
      - name: Run tests
        run: |
          cd build
          lit -va ./test/
